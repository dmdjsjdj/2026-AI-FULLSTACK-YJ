<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS 내부적용</title>
    <style>
        /*  선택자 { 속성  : 값   }  */
        div{   
                width:300px;  
                margin:50px auto;  
                border-radius: 20px;
                box-shadow: 0 0 10px rgba(37, 98, 228, 0.6);
                padding: 20px;
                background-color:rgb(154, 218, 255);
            }
        div:hover{
            background-color: rgb(146, 255, 237);
            transition: all 1s;
        }
        /* Q1. h3 : 선택해서 글자색상 변환, border-left:3px soild 색상 */
        h3{
            color: rgb(61, 43, 226); 
            padding-left: 5px;
            border-left: 4px solid slateblue;
        }
        /* Q2. p  : 글자사이즈 14px , 정렬 - center */
        p{
            font-size: 14px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div>
        <h3>인라인</h3>
        <p>태그 안에 직접 적용</p>
        <p style="color: red;">color:red</p>
    </div>

    <div>
        <h3>내부스타일</h3>
        <p> head 안에 style 태그 사용 작성</p>
        <pre>
            p    { color: red; } 
           선택자 { 속성  : 값   }
        </pre>
    </div>

    <div>
        <h3>외부스타일</h3>
        <p>별도의 .css파일을 만들어서 link태그로 연결</p>
    </div>

</body>
</html>
