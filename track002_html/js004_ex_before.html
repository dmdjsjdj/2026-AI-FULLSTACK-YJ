<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>이벤트 연습</title>
  <style>
    .result_target {
      background-color: black;
      color: white;
      padding: 20px;
      margin: 10px;
      font-size: 20px;
      text-align: center;
      transition: all 0.3s ease; /* 부드러운 애니메이션 효과 */
    }
    .big {
      font-size: 40px;
    }
    .hidden {
      display: none;
    }
  </style>
</head>
<body>
  <div class="card-body">
    <h4>EX</h4>
    <input type="button" value="이름 입력" id="test1" class="btn btn-success" />
    <input type="button" value="버튼 글자 바꾸기" id="test2" class="btn btn-success" />
    <input type="button" value="텍스트 수정" id="test3" class="btn btn-success" />
    <input type="button" value="마우스 이벤트" id="test4" class="btn btn-success" />
    <input type="button" value="크게/작게" id="test5" class="btn btn-success" />
    <input type="button" value="숨기기/보이기" id="test6" class="btn btn-success" />
    <div class="result_target my-5">JAVASCRIPT</div>
  </div>

  <script> 
    let result = document.querySelector(".result_target");
    console.log(result);
    // Q1: 이름 입력받아 알림창 띄우기
    document.getElementById("test1").onclick=function(){
      let name = prompt("이름입력");
      alert(name);
    }
    // Q2: 버튼 글자 바꾸기
    document.getElementById("test2").onclick=function(){
      this.value="글자 바꿈";
    }

    // Q3: result 영역 문자열 알림창 → 이름으로 수정
    let three = document.querySelector("#test3");
    three.addEventListener("click", function(){
      let result_target = document.querySelector(".result_target");
      alert(result_target.innerHTML);
      let name = prompt("수정할 텍스트 입력");
      result_target.innerHTML = name;
    });

    // Q4: 마우스 올리면/떼면 배경색 변경
    document.getElementById("test4").onmouseover=function(){
      result.style.backgroundColor="blue";
    }
    document.getElementById("test4").onmouseout=function(){
      result.style.backgroundColor="aqua";
    }
 
    // Q5: 글자 크게/작게 토글
    document.getElementById("test5").onclick=function(){
      result.classList.toggle("big");
    }

    // Q6: 숨기기/보이기 토글
    document.getElementById("test6").onclick=function(){
      result.classList.toggle("hidden");
    }
  </script>
</body>
</html>
