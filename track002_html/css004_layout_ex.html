<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>얼굴 나열</title>

    <style>
        * {
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
            background-image: linear-gradient(30deg, rgb(194, 194, 255), rgb(180, 234, 255));
        }
        div {
            background-color: aliceblue;
            overflow: hidden;
        }
        h1{ 
            border-left:10px solid #123456; 
            border-bottom:1px solid #123456;
            margin:30px 0; padding-left:20px;
            font-weight: bold;
        }
        .container {
            width: 60%;
            margin: 20px auto ;
            border-radius: 20px;
            background-color: #a2c7f8;
            padding: 20px;
            box-shadow: 0 0 10px rgba(2, 3, 26, 0.3);
            overflow: hidden;
        }
        .f1 {
            float: left;   /*1. 배치 : float: left */
            background-color: #84afda;
        }
        .f2 {
            float: right;  /*2. 배치 : float: right */
            background-color: #c6e3ff;
        }
        ul.team {
            width: 45%;
            list-style: none;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }
        ul.team li {
            float: left;
            margin: 10px;
        }
        ul.team li img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 3px solid rgb(69, 69, 138);
            transition: transform 1.2s, border-color 0.8s;
        }
        ul.team li:first-child img:hover {
            transform: translateY(-20px);
            border-color: aqua;
            background-color: rgb(119, 255, 255);
        }
        ul.team li:nth-child(2) img:hover {
            transform: rotateZ(720deg);
            border-color: rgb(220, 222, 255);
        }
        ul.team li:nth-child(3) img:hover {
            transform: rotateX(180deg);
            border-color: rgb(225, 255, 141);
        }
        ul.team li:nth-child(4) img:hover {
            transform: rotateY(180deg);
            border-color: rgb(139, 255, 145);
        }
        ul.team li:last-child img:hover {
            transform: rotate(180deg);
            border-color: rgb(232, 140, 255);
        }
        /* Q1. ul 태그의 기본 목록 스타일 제거, 안쪽/바깥 여백 없애기

        Q2. li 태그는 왼쪽으로 나란히 배치(float:left), 바깥 여백(10px)
        Q3. img 너비/높이(100px), 원형(border-radius:50%), 테두리(3px solid #ff6600),
            전환 효과(transform, border-color 각각 0.8s)
        Q4. 첫 번째 얼굴: 마우스 오버 시 위로 점프(translateY(-20px)), 테두리 색(#00ccff)
        Q5. 두 번째 얼굴: 마우스 오버 시 좌우 흔들기(rotateZ(20deg)), 테두리 색(#33cc33)
        Q6. 세 번째 얼굴: 마우스 오버 시 X축 뒤집기(rotateX(180deg)), 테두리 색(#ff33aa)
        Q7. 네 번째 얼굴: 마우스 오버 시 Y축 뒤집기(rotateY(180deg)), 테두리 색(#ffaa00)
        Q8. 마지막 얼굴: 마우스 오버 시 빙글빙글 회전(rotate(360deg) scale(1.2)), 테두리 색(#6600ff)
           // f1은 왼쪽에 배치, f2는 오른쪽에 배치 -하얀색 배경 나오게 
           //  :nth-child(2)  
        */
    </style>
</head>
<body>
    <div class="container">
        <h1>float</h1>
        <ul class="team f1">
            <li><img src="./img/cat2.png" alt="프로필1"/></li>
            <li><img src="./img/four.png" alt="프로필2"/></li>
            <li><img src="./img/six.png" alt="프로필3"/></li>
            <li><img src="./img/five.png" alt="프로필4"/></li>
            <li><img src="./img/seven.png" alt="프로필5"/></li>
        </ul>

        <ul class="team f2">
            <li><img src="https://picsum.photos/100?random=1" alt="얼굴1"></li>
            <li><img src="https://picsum.photos/100?random=2" alt="얼굴2"></li>
            <li><img src="https://picsum.photos/100?random=3" alt="얼굴3"></li>
            <li><img src="https://picsum.photos/100?random=4" alt="얼굴4"></li>
            <li><img src="https://picsum.photos/100?random=5" alt="얼굴5"></li>
        </ul>
    </div>
    
</body>
</html>
