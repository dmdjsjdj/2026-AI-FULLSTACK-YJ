<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1wk chexk</title>

    <style>
        /* 선택자 : *(전체)  p(태그)  #id(아이디)  .class(클래스) */
        *{ margin:0; padding:0; }

        /* Q1. body 글꼴 : Segoe UI, 배경색 : #f9f9f9 */
        body{
            font-family: 'Segoe UI';
            background-color: rgb(243, 244, 248);
        }

        /* Q2. h1 중앙정렬, 글자색상 : #333 */ 
        h1{
            text-align: center;
            color: blue;
        }

        /* Q3. .notice 카드 너비 : 350px, 테두리 : 1px 실선 #ccc, 안쪽여백 : 15px, 여백 : 20px 중앙정렬 */ 
        .notice{
            width: 350px;
            border: 1px solid #ccc;
            padding: 15px;
            margin: 20px auto;
            text-align: center;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.33);
            border-radius: 20px;
        }

        /* Q4. .notice h2 글자크기 : 18px, 글자색상 : #444 */ 
        .notice h2{
            font-size: 18px;
            color: rgb(52, 23, 80);
        }

        /* Q5. #urgent 배경색 : #ffe0e0 , 부드러운효과*/
        #urgent{
            background-color: rgb(186, 134, 212);
            transition: all 1s;
        }

        /* Q6.  #urgent  마우스 올렸을때 배경빨강, 글자 white , *추가 - 상자째로 회전&스케일↑ */ 
        #urgent:hover{
            background-color: rgb(219, 55, 55);
            color: gold;
            transform: rotate(5deg) scale(1.5) skewX(10deg) rotateX(360deg) rotateY(360deg);

        }

        /* Q7. .notice img 너비/높이 : 80px, 모서리둥글게 */ 
        .notice img{
            width: 100px;
            height: 100px;
            border-radius: 10px;
            transition: all 0.3s;
        }

        /* bonus : 이미지에 마우스 올리면 Y축 기준 180도 회전  
                   참조사이트 - https://www.w3schools.com/tools/tool_css_transform.php */
        .notice img:hover{
            transform: rotateY(180deg) scale(1.5);
            width: 150px;
            height: 120px;
        }

    </style>

</head>
<body>
    <div>
        <h1>공지사항 </h1>

        <div class="notice">
            <p><img src="./img/cat2.png" alt="공지 사진" /></p>
            <h2>일반 공지</h2>
            <p>다음 주 월요일은 정기 점검이 있습니다.</p>
        </div>

        <div class="notice" id="urgent">
            <h2>긴급 공지</h2>
            <p>오늘 오후 서버 점검으로 서비스가 일시 중단됩니다.</p>
        </div>
    </div>
</body>
</html>
