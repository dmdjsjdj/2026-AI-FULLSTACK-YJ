<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>002. tag</title>
</head>
<body>
    <!-- 영역(div)잡고 제목(h) 내용(p) -->
     <div>
        <h3>제목태그 : h1~h6</h3>
        <pre>
            h1: 로고 상호명
            h2: 주메뉴
            h3~h6: 각 단락 중요 제목
        </pre>
     </div> <!-- end div -->

     <!-- 2. 문단 (p/pre) -->
      <div>
        <h3>문단 : p, pre</h3>
        <p>
            p : 일반문단
            공백, 줄바꿈 인식 안됨
        </p>
        <pre>
            pre : 코드, 미리보기 문단
            공백, 줄바꿈 인식 됨
        </pre>
      </div>


</body>
</html>
