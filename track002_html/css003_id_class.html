<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS ID/CLASS</title>
    <style>
        /* 전체 여백빼기 */
        *{ margin: 0; padding: 0; }

        /* body 좋아하는 글꼴 */
        body{
            font-family:'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
            background: linear-gradient(135deg, rgb(170, 252, 234), rgb(152, 197, 233));
        }
        /* Q1. h3 중앙정렬, 글자색상 : #e1306c,  아래쪽여백 : 10px  */
        h3{
            text-align: center;
            color: blue;
            margin-bottom: 10px;
        }
        /* Q2. p 중앙정렬, 글자크기 : 14px, 글자색상 : #666, 아래쪽여백 : 20px */
        p{
            text-align: center;
            font-size: 14px;
            color: rgb(85, 146, 148);
            margin-bottom: 20px;
        }
        /* Q3. div 배경색상 : #fff, 너비 : 300px, 여백 : 위아래 30px 좌우 중앙정렬, 
            안쪽여백 : 20px, 테두리 둥글게 : 15px, 그림자효과, 왼쪽정렬 */
        div{
            background-image: linear-gradient(30deg, #e2fbff, rgb(206, 202, 255));
            width: 300px;
            margin: 30px auto;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 0 12px rgba(41, 63, 122, 0.5);
            text-shadow: 0 0 8px rgba(24, 71, 199, 0.5), 10px 0 5px rgb(255, 208, 216);
            text-align: left;
        }
        /* Q4. dt 글자굵기 : 굵게, 아래쪽여백 : 10px, 글자색상 : #333 */
        dt{
            font-weight: bold;
            margin-bottom: 10px;
            color: rgb(82, 133, 228);
        }
        /* Q5. dd 글자크기 : 14px, 글자색상 : #666, 아래쪽여백 : 8px, 
            왼쪽 안쪽여백 : 10px */
        dd{
            font-size: 14px;
            color: blueviolet;
            margin-bottom: 8px;
            padding-left: 10px;
        }

        /* Q6. id1, id2 글자색상 :  각각 색상다르게 글자굵기 : 굵게 
                id="id1"
                id="id2"
        */
        dd#id1{ color: rgb(27, 201, 201);  }
          #id2{ color: rgb(24, 226, 149); }
    
        /* Q7. .mycss 배경색상 : #f9f1f7, 왼쪽 테두리 : 4px 실선 #e1306c, 
                안쪽여백 : 5px 10px, 테두리 둥글게 : 5px 
                class="myclass two
            */
        .myclass{ 
            background-color: rgb(160, 226, 247);
            border-left: 4px solid rgb(160, 88, 228); 
            padding: 5px 10px;
            border-radius: 5px;
        }
        .two{ border-color: aqua;}
    </style>
</head>
<body>
    <div>
        <h3>id</h3>
        <p> css 안에서 선택자 - 유일한 값 </p>
        <dl>
            <dt>id 특징</dt>
            <dd>html 문서에서 한번만 사용 가능</dd>
            <dd id="id1"> 중복 불가 - Error: Duplicate ID id1. </dd>
            <dd id="id2" > css 에서는 #id명 </dd>
            <dd class="myclass"> 우선순위 id와 class 모두 있을때 id가 더 높음 </dd>
        </dl>
    </div><!-- end div -->

    <div>
        <h3>class</h3>
        <p> css 안에서 선택자 - 여러개 선택시 </p>
        <dl>
            <dt>class의 특징</dt>
            <dd class="myclass">재사용 가능 : 여러 요소에 class 지정</dd>
            <dd class="myclass two"> 하나의 요소에 여러개의 class 사용 가능 </dd>
            <dd>css 에서는 .class 명 </dd>
            <dd>반복되는 스타일에 적합</dd>
        </dl>
    </div>
</body>
</html>
